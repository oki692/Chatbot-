
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', // Use system preference
            theme: {
                extend: {
                    colors: {
                        background: "var(--background)",
                        foreground: "var(--foreground)",
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --background: #FFFFFF;
            --foreground: #131314;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --background: #131314;
                --foreground: #FFFFFF;
            }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--background);
            color: var(--foreground);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        
        .text-foreground {
            color: var(--foreground);
        }

        /* Hide scrollbar completely */
        ::-webkit-scrollbar {
            display: none;
        }
        html {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE 10+ */
        }

        /* Markdown Styles */
        .markdown-body {
            color: #374151; /* Gray-700 for light mode */
            line-height: 1.6;
            font-size: 1rem;
        }
        
        @media (prefers-color-scheme: dark) {
            .markdown-body {
                color: #E0E0E0;
            }
        }

        .markdown-body pre {
            background-color: #f3f4f6; /* Gray-100 for light */
            padding: 1rem;
            border-radius: 0.7rem;
            overflow-x: auto;
            margin: 0.75rem 0;
            border: 1px solid #e5e7eb;
        }

        @media (prefers-color-scheme: dark) {
            .markdown-body pre {
                background-color: #1e1e1e;
                border: 1px solid #2c2c2e;
            }
        }

        .markdown-body code {
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.875em;
        }
        .markdown-body :not(pre) > code {
            background-color: #f3f4f6;
            padding: 0.2em 0.4em;
            border-radius: 0.3rem;
            color: #1f2937;
        }

        @media (prefers-color-scheme: dark) {
            .markdown-body :not(pre) > code {
                background-color: #2c2c2e;
                color: #e2e8f0;
            }
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
            color: #111827;
            font-weight: 600;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            line-height: 1.3;
        }

        @media (prefers-color-scheme: dark) {
            .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
                color: #FFFFFF;
            }
        }

        .markdown-body h1 { font-size: 1.5em; }
        .markdown-body h2 { font-size: 1.3em; }
        .markdown-body h3 { font-size: 1.1em; }
        
        .markdown-body p {
            margin-bottom: 1em;
        }
        .markdown-body ul, .markdown-body ol {
            margin-bottom: 1em;
            padding-left: 1.5em;
        }
        .markdown-body ul { list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }
        
        .markdown-body li {
            margin-bottom: 0.25em;
        }
        .markdown-body a {
            color: #4D88FF;
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
        }
        .markdown-body blockquote {
            border-left: 3px solid #4D88FF;
            padding-left: 1rem;
            color: #6b7280;
            margin: 1rem 0;
            font-style: italic;
        }

        @media (prefers-color-scheme: dark) {
            .markdown-body blockquote {
                color: #8A8A8D;
            }
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9em;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #e5e7eb;
            padding: 0.75rem;
            text-align: left;
        }

        @media (prefers-color-scheme: dark) {
            .markdown-body th, .markdown-body td {
                border: 1px solid #2c2c2e;
            }
        }

        .markdown-body th {
            background-color: #f9fafb;
            font-weight: 600;
        }

        @media (prefers-color-scheme: dark) {
            .markdown-body th {
                background-color: #1c1c1e;
            }
        }

        .markdown-body strong {
            font-weight: 600;
            color: #111827;
        }

        @media (prefers-color-scheme: dark) {
            .markdown-body strong {
                color: #FFFFFF;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react-markdown": "https://esm.sh/react-markdown@9?bundle",
    "remark-gfm": "https://esm.sh/remark-gfm@4?bundle"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
